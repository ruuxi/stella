name: Build Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.0.1)"
        required: true
        default: "0.0.1"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: desktop

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: desktop
        run: bun install

      - name: Write .env.local
        working-directory: desktop
        shell: bash
        run: |
          cat > .env.local << 'ENVEOF'
          VITE_CONVEX_URL=https://impartial-crab-34.convex.cloud
          VITE_CONVEX_SITE_URL=https://impartial-crab-34.convex.site
          VITE_SITE_URL=http://localhost:5714
          VITE_TWITCH_EMOTE_TWITCH_ID=40934651
          ENVEOF

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release tarball
        working-directory: desktop
        shell: bash
        run: |
          tar --zstd -cf "../stella-desktop-${{ matrix.platform }}.tar.zst" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="coverage" \
            --exclude=".stella" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-desktop-${{ matrix.platform }}
          path: stella-desktop-${{ matrix.platform }}.tar.zst
          retention-days: 30

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stella-desktop-${{ matrix.platform }}.tar.zst
