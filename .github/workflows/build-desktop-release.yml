name: Build Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.0.1)"
        required: true
        default: "0.0.1"

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-latest
            platform: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full repo (no sparse-checkout) so `git archive HEAD` below
          # captures every tracked file. The git object store is also what
          # the install-update agent's partial fetch later resolves against.
          fetch-depth: 1

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release tarball
        shell: bash
        run: |
          rm -rf release-root
          mkdir release-root

          # Stream every git-tracked file at HEAD into release-root so the
          # working tree matches upstream's commit byte-for-byte. The
          # launcher then attaches real upstream history with `git fetch
          # --filter=blob:none origin <commit>` + `git reset --mixed
          # <commit>` and gets a clean working state with no synthetic
          # "deleted" entries. native/out is gitignored so it never lands
          # in the archive; native helpers come from R2 at install time.
          git archive HEAD | tar -x -C release-root/

          mkdir -p release-root/state/outputs

          node <<'NODE'
          const { createHash } = require("node:crypto");
          const { readdirSync, statSync, readFileSync, writeFileSync } = require("node:fs");
          const { join, relative, sep } = require("node:path");

          const root = "release-root";
          const files = {};

          function walk(dir) {
            for (const entry of readdirSync(dir)) {
              const path = join(dir, entry);
              const stat = statSync(path);
              if (stat.isDirectory()) {
                walk(path);
                continue;
              }
              const rel = relative(root, path).split(sep).join("/");
              const bytes = readFileSync(path);
              files[rel] = {
                sha256: createHash("sha256").update(bytes).digest("hex"),
                size: stat.size,
              };
            }
          }

          walk(root);
          writeFileSync(
            join(root, "stella-release.json"),
            `${JSON.stringify({
              schemaVersion: 1,
              tag: `desktop-v${process.env.STELLA_DESKTOP_VERSION}`,
              version: process.env.STELLA_DESKTOP_VERSION,
              platform: process.env.STELLA_DESKTOP_PLATFORM,
              commit: process.env.STELLA_DESKTOP_COMMIT,
              files,
            }, null, 2)}\n`,
          );
          NODE

          tar --zstd -cf "stella-desktop-${{ matrix.platform }}.tar.zst" -C release-root .
        env:
          STELLA_DESKTOP_VERSION: ${{ steps.version.outputs.version }}
          STELLA_DESKTOP_PLATFORM: ${{ matrix.platform }}
          STELLA_DESKTOP_COMMIT: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-desktop-${{ matrix.platform }}
          path: stella-desktop-${{ matrix.platform }}.tar.zst
          retention-days: 30

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - desktop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: stella-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes
          fi

          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --clobber

      - name: Publish desktop payloads to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_BASE_URL: https://pub-a319aaada8144dc9be5a83625033769c.r2.dev
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          release_dir="desktop/releases/${tag}"
          manifest_path="$(mktemp)"

          node - "$manifest_path" "$tag" "$GITHUB_SHA" "$R2_PUBLIC_BASE_URL" release-assets/stella-desktop-*.tar.zst <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync, statSync, writeFileSync } = require("node:fs");
          const { basename } = require("node:path");

          const [manifestPath, tag, commit, publicBaseUrl, ...archivePaths] = process.argv.slice(2);
          const assets = {};
          for (const archivePath of archivePaths) {
            const name = basename(archivePath);
            const match = name.match(/^stella-desktop-(.+)\.tar\.zst$/);
            if (!match) continue;
            const platform = match[1];
            const bytes = readFileSync(archivePath);
            assets[platform] = {
              url: `${publicBaseUrl.replace(/\/$/, "")}/desktop/releases/${tag}/${name}`,
              sha256: createHash("sha256").update(bytes).digest("hex"),
              size: statSync(archivePath).size,
            };
          }
          writeFileSync(
            manifestPath,
            `${JSON.stringify({
              schemaVersion: 1,
              tag,
              commit,
              assets,
              publishedAt: new Date().toISOString(),
            }, null, 2)}\n`,
          );
          NODE

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          aws s3 cp "release-assets/" "s3://${R2_BUCKET}/${release_dir}/" \
            --recursive \
            --exclude "*" \
            --include "stella-desktop-*.tar.zst" \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/desktop/current.json" \
            --content-type "application/json" \
            --cache-control "no-cache" \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/${release_dir}/manifest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Notify Convex of new desktop release
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          DESKTOP_RELEASE_PUBLISH_SECRET: ${{ secrets.DESKTOP_RELEASE_PUBLISH_SECRET }}
          R2_PUBLIC_BASE_URL: https://pub-a319aaada8144dc9be5a83625033769c.r2.dev
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CONVEX_SITE_URL:-}" ] || [ -z "${DESKTOP_RELEASE_PUBLISH_SECRET:-}" ]; then
            echo "CONVEX_SITE_URL or DESKTOP_RELEASE_PUBLISH_SECRET is not set; skipping Convex notify."
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          payload_path="$(mktemp)"

          node - "$payload_path" "$tag" "$GITHUB_SHA" "$R2_PUBLIC_BASE_URL" release-assets/stella-desktop-*.tar.zst <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync, statSync, writeFileSync } = require("node:fs");
          const { basename } = require("node:path");

          const [payloadPath, tag, commit, publicBaseUrl, ...archivePaths] = process.argv.slice(2);
          const assets = {};
          for (const archivePath of archivePaths) {
            const name = basename(archivePath);
            const match = name.match(/^stella-desktop-(.+)\.tar\.zst$/);
            if (!match) continue;
            const platform = match[1];
            const bytes = readFileSync(archivePath);
            assets[platform] = {
              url: `${publicBaseUrl.replace(/\/$/, "")}/desktop/releases/${tag}/${name}`,
              sha256: createHash("sha256").update(bytes).digest("hex"),
              size: statSync(archivePath).size,
            };
          }
          writeFileSync(
            payloadPath,
            JSON.stringify({
              tag,
              commit,
              publishedAt: new Date().toISOString(),
              assets,
            }),
          );
          NODE

          curl --fail-with-body --show-error --silent \
            -X POST "${CONVEX_SITE_URL%/}/api/desktop-releases/publish" \
            -H "Authorization: Bearer ${DESKTOP_RELEASE_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            --data-binary "@${payload_path}"

