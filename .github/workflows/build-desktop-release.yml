name: Build Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.0.1)"
        required: true
        default: "0.0.1"

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: desktop

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release tarball
        working-directory: desktop
        shell: bash
        run: |
          tar --zstd -cf "../stella-desktop-${{ matrix.platform }}.tar.zst" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="coverage" \
            --exclude=".stella" \
            --exclude="node_modules" \
            --exclude="dist" \
            --exclude="dist-electron" \
            --exclude="dist-ssr" \
            --exclude="*.local" \
            --exclude="*.tsbuildinfo" \
            --exclude=".vite-dev-url" \
            --exclude=".stella-hmr-state.json" \
            --exclude="public/emotes/assets" \
            --exclude="stella-browser/node_modules" \
            --exclude="stella-browser/dist" \
            --exclude="stella-browser/cli/target" \
            --exclude="stella-browser/*.o" \
            --exclude="stella-browser/*.png" \
            --exclude="stella-browser/*.jpeg" \
            --exclude="stella-browser/*.jpg" \
            --exclude="stella-browser/.pnpm-store" \
            --exclude="stella-browser/opensrc" \
            --exclude="stella-browser/docs/node_modules" \
            --exclude="stella-browser/docs/.next" \
            --exclude="stella-browser/docs/out" \
            --exclude="stella-browser/nul" \
            --exclude="stella-browser/_bench_chain.js" \
            --exclude="stella-browser/bun.lock" \
            --exclude="release" \
            --exclude="workspace" \
            --exclude="native/*.exe" \
            --exclude="native/*.obj" \
            --exclude=".stella-bindings.json" \
            --exclude=".stella/state" \
            --exclude=".stella/logs" \
            --exclude=".stella/recovery" \
            --exclude=".stella/canvas" \
            --exclude=".stella/mods/features.json" \
            --exclude=".stella/skills" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-desktop-${{ matrix.platform }}
          path: stella-desktop-${{ matrix.platform }}.tar.zst
          retention-days: 30

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stella-desktop-${{ matrix.platform }}.tar.zst

  launcher:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            binary: src-tauri/target/release/StellaSetup.exe
          - os: macos-latest
            platform: darwin-arm64
            binary: src-tauri/target/release/StellaSetup

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: launcher

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: launcher
        run: bun install

      - name: Build launcher
        working-directory: launcher
        run: bunx tauri build

      - name: Stage release binary
        shell: bash
        run: |
          cp "launcher/${{ matrix.binary }}" "StellaSetup-${{ matrix.platform }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: StellaSetup-${{ matrix.platform }}*
          retention-days: 30

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: StellaSetup-${{ matrix.platform }}*
