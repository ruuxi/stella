name: Build Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.0.1)"
        required: true
        default: "0.0.1"

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-latest
            platform: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .gitignore
            package.json
            bun.lock
            desktop
            runtime
            state

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release tarball
        shell: bash
        run: |
          rm -rf release-root
          mkdir -p release-root/state/outputs

          cp .gitignore package.json bun.lock release-root/
          cp -R desktop runtime release-root/
          cp state/DREAM.md state/registry.md release-root/state/
          cp -R state/skills release-root/state/
          cp state/outputs/README.md release-root/state/outputs/README.md

          node <<'NODE'
          const { createHash } = require("node:crypto");
          const { readdirSync, statSync, readFileSync, writeFileSync } = require("node:fs");
          const { join, relative, sep } = require("node:path");

          const root = "release-root";
          const files = {};

          function walk(dir) {
            for (const entry of readdirSync(dir)) {
              const path = join(dir, entry);
              const stat = statSync(path);
              if (stat.isDirectory()) {
                walk(path);
                continue;
              }
              const rel = relative(root, path).split(sep).join("/");
              const bytes = readFileSync(path);
              files[rel] = {
                sha256: createHash("sha256").update(bytes).digest("hex"),
                size: stat.size,
              };
            }
          }

          walk(root);
          writeFileSync(
            join(root, "stella-release.json"),
            `${JSON.stringify({
              schemaVersion: 1,
              tag: `desktop-v${process.env.STELLA_DESKTOP_VERSION}`,
              version: process.env.STELLA_DESKTOP_VERSION,
              platform: process.env.STELLA_DESKTOP_PLATFORM,
              files,
            }, null, 2)}\n`,
          );
          NODE

          tar --zstd -cf "stella-desktop-${{ matrix.platform }}.tar.zst" -C release-root .
        env:
          STELLA_DESKTOP_VERSION: ${{ steps.version.outputs.version }}
          STELLA_DESKTOP_PLATFORM: ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-desktop-${{ matrix.platform }}
          path: stella-desktop-${{ matrix.platform }}.tar.zst
          retention-days: 30

  launcher:
    needs: desktop
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: macos-latest
            platform: darwin-x64
            rust-target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: launcher

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp launcher version
        working-directory: launcher
        run: node scripts/stamp-version.mjs "${{ steps.version.outputs.version }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust target
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        working-directory: launcher
        run: bun install

      # ── macOS: import signing certificate ──
      - name: Import Apple certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ── Build (signing + notarization happen automatically on macOS) ──
      - name: Build launcher
        working-directory: launcher
        env:
          CI: false
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: bunx tauri build ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      # ── macOS: rename + upload signed .dmg ──
      - name: Rename macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: cp launcher/src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg Stella-${{ matrix.platform }}.dmg

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: Stella-${{ matrix.platform }}.dmg
          retention-days: 30

      # ── Windows: upload raw binary ──
      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: launcher/src-tauri/target/release/Stella.exe
          retention-days: 30

      # ── macOS: cleanup keychain ──
      - name: Cleanup keychain
        if: matrix.os == 'macos-latest' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - desktop
      - launcher
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: stella-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes
          fi

          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --clobber

      - name: Publish desktop payloads to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_BASE_URL: https://pub-58708621bfa94e3bb92de37cde354c0d.r2.dev
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          release_dir="desktop/releases/${tag}"
          manifest_path="$(mktemp)"

          node - "$manifest_path" "$tag" "$R2_PUBLIC_BASE_URL" release-assets/stella-desktop-*.tar.zst <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync, statSync, writeFileSync } = require("node:fs");
          const { basename } = require("node:path");

          const [manifestPath, tag, publicBaseUrl, ...archivePaths] = process.argv.slice(2);
          const assets = {};
          for (const archivePath of archivePaths) {
            const name = basename(archivePath);
            const match = name.match(/^stella-desktop-(.+)\.tar\.zst$/);
            if (!match) continue;
            const platform = match[1];
            const bytes = readFileSync(archivePath);
            assets[platform] = {
              url: `${publicBaseUrl.replace(/\/$/, "")}/desktop/releases/${tag}/${name}`,
              sha256: createHash("sha256").update(bytes).digest("hex"),
              size: statSync(archivePath).size,
            };
          }
          writeFileSync(
            manifestPath,
            `${JSON.stringify({
              schemaVersion: 1,
              tag,
              assets,
              publishedAt: new Date().toISOString(),
            }, null, 2)}\n`,
          );
          NODE

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          aws s3 cp "release-assets/" "s3://${R2_BUCKET}/${release_dir}/" \
            --recursive \
            --exclude "*" \
            --include "stella-desktop-*.tar.zst" \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/desktop/current.json" \
            --content-type "application/json" \
            --cache-control "no-cache" \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/${release_dir}/manifest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable" \
            --endpoint-url "$R2_ENDPOINT"
