name: Build Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.0.1)"
        required: true
        default: "0.0.1"

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: desktop

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release tarball
        working-directory: desktop
        shell: bash
        run: |
          tar --zstd -cf "../stella-desktop-${{ matrix.platform }}.tar.zst" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="coverage" \
            --exclude=".stella" \
            --exclude="node_modules" \
            --exclude="dist" \
            --exclude="dist-electron" \
            --exclude="dist-ssr" \
            --exclude="*.local" \
            --exclude="*.tsbuildinfo" \
            --exclude=".vite-dev-url" \
            --exclude=".stella-hmr-state.json" \
            --exclude="stella-browser/node_modules" \
            --exclude="stella-browser/dist" \
            --exclude="stella-browser/cli/target" \
            --exclude="stella-browser/*.o" \
            --exclude="stella-browser/*.png" \
            --exclude="stella-browser/*.jpeg" \
            --exclude="stella-browser/*.jpg" \
            --exclude="stella-browser/.pnpm-store" \
            --exclude="stella-browser/opensrc" \
            --exclude="stella-browser/docs/node_modules" \
            --exclude="stella-browser/docs/.next" \
            --exclude="stella-browser/docs/out" \
            --exclude="stella-browser/nul" \
            --exclude="stella-browser/_bench_chain.js" \
            --exclude="stella-browser/bun.lock" \
            --exclude="release" \
            --exclude=".stella-bindings.json" \
            --exclude=".stella/state" \
            --exclude=".stella/logs" \
            --exclude=".stella/recovery" \
            --exclude=".stella/canvas" \
            --exclude=".stella/mods/features.json" \
            --exclude=".stella/skills" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-desktop-${{ matrix.platform }}
          path: stella-desktop-${{ matrix.platform }}.tar.zst
          retention-days: 30

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stella-desktop-${{ matrix.platform }}.tar.zst

  launcher:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: launcher

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: launcher
        run: bun install

      # ── macOS: import signing certificate ──
      - name: Import Apple certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ── Build (signing + notarization happen automatically on macOS) ──
      - name: Build launcher
        working-directory: launcher
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: bunx tauri build

      # ── macOS: rename + upload signed .dmg ──
      - name: Rename macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: cp launcher/src-tauri/target/release/bundle/dmg/*.dmg StellaSetup-darwin-arm64.dmg

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: StellaSetup-darwin-arm64.dmg
          retention-days: 30

      - name: Upload macOS to release
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: StellaSetup-darwin-arm64.dmg

      # ── Windows: upload raw binary ──
      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: launcher/src-tauri/target/release/StellaSetup.exe
          retention-days: 30

      - name: Upload Windows to release
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/src-tauri/target/release/StellaSetup.exe

      # ── macOS: cleanup keychain ──
      - name: Cleanup keychain
        if: matrix.os == 'macos-latest' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
