name: Build Launcher

on:
  push:
    paths:
      - "launcher/**"
      - ".github/workflows/build-launcher.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: launcher
        run: bun install --frozen-lockfile

      - name: Build launcher
        working-directory: launcher
        run: bun run build:canary

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: launcher/build/
          retention-days: 30
