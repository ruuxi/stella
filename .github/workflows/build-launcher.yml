name: Build Launcher

# Builds the Stella launcher (Tauri app) for macOS arm64, macOS x64, and
# Windows x64. The source lives in ruuxi/stella-launcher, but the build
# runs in this repo because the signing/notarization/R2 secrets are here
# (and copying secrets across GitHub repos isn't possible). Trigger via:
#
#   gh workflow run build-launcher.yml -R ruuxi/stella -f version=0.0.50
#
# Publishes:
#   - Tauri updater artifacts + manifest -> R2 (launcher/stable/latest.json)
#   - User-facing Stella-*.dmg / Stella.exe -> R2 (launcher/stable/) so the
#     website's Download buttons resolve to a stable CDN URL.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Launcher version (e.g. 0.0.50). Must match an existing launcher-v<version> tag in ruuxi/stella-launcher."
        required: true
        default: "0.0.50"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            updater_platform: windows-x86_64
          - os: macos-latest
            platform: darwin-arm64
            rust-target: aarch64-apple-darwin
            updater_platform: darwin-aarch64
          - os: macos-latest
            platform: darwin-x64
            rust-target: x86_64-apple-darwin
            updater_platform: darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout stella-launcher source
        uses: actions/checkout@v4
        with:
          repository: ruuxi/stella-launcher
          ref: launcher-v${{ inputs.version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Stamp launcher version
        run: node scripts/stamp-version.mjs "${{ inputs.version }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust target
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: bun install

      # ── macOS: import signing certificate ──
      - name: Import Apple certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ── Build (signing + notarization happen automatically on macOS) ──
      - name: Build launcher
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: bunx tauri build ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      # ── macOS: rename + upload signed .dmg ──
      - name: Rename macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg Stella-${{ matrix.platform }}.dmg

      - name: Prepare macOS updater artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz Stella-launcher-${{ matrix.updater_platform }}.app.tar.gz
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz.sig Stella-launcher-${{ matrix.updater_platform }}.app.tar.gz.sig

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: Stella-${{ matrix.platform }}.dmg
          retention-days: 30

      - name: Upload macOS updater artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-updater-${{ matrix.platform }}
          path: Stella-launcher-${{ matrix.updater_platform }}.app.tar.gz*
          retention-days: 30

      - name: Prepare Windows updater artifact
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp src-tauri/target/release/bundle/nsis/*.exe Stella-launcher-${{ matrix.updater_platform }}-setup.exe
          cp src-tauri/target/release/bundle/nsis/*.exe.sig Stella-launcher-${{ matrix.updater_platform }}-setup.exe.sig

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-${{ matrix.platform }}
          path: src-tauri/target/release/Stella.exe
          retention-days: 30

      - name: Upload Windows updater artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stella-launcher-updater-${{ matrix.platform }}
          path: Stella-launcher-${{ matrix.updater_platform }}-setup.exe*
          retention-days: 30

      # ── macOS: cleanup keychain ──
      - name: Cleanup keychain
        if: matrix.os == 'macos-latest' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  publish:
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: stella-launcher-*
          merge-multiple: true

      - name: Publish launcher to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_BASE_URL: https://pub-a319aaada8144dc9be5a83625033769c.r2.dev
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          tag="launcher-v${version}"
          release_dir="launcher/releases/${tag}"
          stable_dir="launcher/stable"
          manifest_path="$(mktemp)"

          # Build the Tauri auto-updater manifest from the .sig signatures.
          node - "$manifest_path" "$version" "$tag" "$R2_PUBLIC_BASE_URL" release-assets/Stella-launcher-*.sig <<'NODE'
          const { existsSync, readFileSync, writeFileSync } = require("node:fs");
          const { basename } = require("node:path");

          const [manifestPath, version, tag, publicBaseUrl, ...signaturePaths] = process.argv.slice(2);
          const platforms = {};

          for (const signaturePath of signaturePaths) {
            const artifactName = basename(signaturePath).replace(/\.sig$/, "");
            const signature = readFileSync(signaturePath, "utf8").trim();
            const artifactPath = signaturePath.replace(/\.sig$/, "");
            if (!existsSync(artifactPath)) {
              throw new Error(`Missing updater artifact for ${signaturePath}`);
            }
            const match = artifactName.match(/^Stella-launcher-(darwin-aarch64|darwin-x86_64)\.app\.tar\.gz$|^Stella-launcher-(windows-x86_64)-setup\.exe$/);
            if (!match) {
              throw new Error(`Unexpected launcher updater artifact name: ${artifactName}`);
            }
            const platform = match[1] ?? match[2];
            if (platforms[platform]) {
              throw new Error(`Duplicate launcher updater artifact for ${platform}`);
            }
            platforms[platform] = {
              signature,
              url: `${publicBaseUrl.replace(/\/$/, "")}/launcher/releases/${tag}/${artifactName}`,
            };
          }
          for (const required of ["darwin-aarch64", "darwin-x86_64", "windows-x86_64"]) {
            if (!platforms[required]) throw new Error(`Missing launcher updater artifact for ${required}`);
          }

          writeFileSync(
            manifestPath,
            `${JSON.stringify({
              version,
              notes: `Stella launcher ${version}`,
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2)}\n`,
          );
          NODE

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          # Versioned dir: every artifact (updater + user-facing) under the immutable tag.
          aws s3 cp "release-assets/" "s3://${R2_BUCKET}/${release_dir}/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT"

          # Stable dir: user-facing installers at predictable URLs the website
          # links to. Overwritten on every launcher release.
          for asset in release-assets/Stella-darwin-arm64.dmg release-assets/Stella-darwin-x64.dmg release-assets/Stella.exe; do
            if [ -f "$asset" ]; then
              aws s3 cp "$asset" "s3://${R2_BUCKET}/${stable_dir}/$(basename "$asset")" \
                --cache-control "no-cache" \
                --endpoint-url "$R2_ENDPOINT"
            fi
          done

          # Stable updater manifest (Tauri auto-updater polls this).
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/launcher/stable/latest.json" \
            --content-type "application/json" \
            --cache-control "no-cache" \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/${release_dir}/latest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable" \
            --endpoint-url "$R2_ENDPOINT"
