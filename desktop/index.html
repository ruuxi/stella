<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/stella-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' https://js.stripe.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; frame-src 'self' http: https:; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>Stella</title>
    <style>
      @font-face {
        font-family: "Cormorant Garamond Launch";
        src: url("/src/assets/fonts/cormorant-garamond-italic.ttf") format("truetype");
        font-display: block;
        font-style: italic;
        font-weight: 400;
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: #f2f4f8;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
        }
      }

      .stella-launch {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background: #f2f4f8;
        color: #161616;
        opacity: 1;
        transition: opacity 220ms ease;
        pointer-events: none;
      }

      @media (prefers-color-scheme: dark) {
        .stella-launch {
          background: #161616;
          color: #f2f4f8;
        }
      }

      .stella-launch[data-exiting="true"] {
        opacity: 0;
      }

      .stella-launch__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        transform: translateY(-8px);
      }

      .stella-launch__logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.1));
      }

      .stella-launch__name {
        font-family: "Cormorant Garamond Launch", Georgia, serif;
        font-size: 30px;
        font-style: italic;
        font-weight: 400;
        letter-spacing: -0.03em;
        line-height: 1;
      }
    </style>
    <!-- Preload critical fonts (must match fonts.css @font-face usage) -->
    <link rel="preload" href="/src/assets/fonts/cormorant-garamond-italic.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
    <link rel="preload" href="/src/assets/fonts/manrope.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/src/assets/fonts/ibm-plex-mono.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  </head>
  <body>
    <div id="stella-launch" class="stella-launch" aria-hidden="true">
      <div class="stella-launch__content">
        <img class="stella-launch__logo" src="/stella-logo.svg" alt="" />
        <div class="stella-launch__name">Stella</div>
      </div>
    </div>
    <div id="root">
      <div id="stella-mini-boot" style="display: none" aria-hidden="true">
        <div class="stella-mini-boot__top">
          <span></span>
          <span></span>
        </div>
        <div class="stella-mini-boot__body">
          <div class="stella-mini-boot__mark">Stella</div>
          <div class="stella-mini-boot__line stella-mini-boot__line--wide"></div>
          <div class="stella-mini-boot__line"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
