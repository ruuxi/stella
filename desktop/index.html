<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/stella-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' https://js.stripe.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; frame-src 'self' http: https:; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>Stella</title>
    <style>
      @font-face {
        font-family: "Cormorant Garamond Launch";
        src: url("/src/assets/fonts/cormorant-garamond-italic.ttf") format("truetype");
        font-display: block;
        font-style: italic;
        font-weight: 400;
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: #f2f4f8;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
        }
      }

      .stella-launch {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background: #f2f4f8;
        color: #161616;
        opacity: 1;
        transition: opacity 220ms ease;
        pointer-events: none;
      }

      @media (prefers-color-scheme: dark) {
        .stella-launch {
          background: #161616;
          color: #f2f4f8;
        }
      }

      .stella-launch[data-exiting="true"] {
        opacity: 0;
      }

      .stella-launch__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        transform: translateY(-8px);
      }

      .stella-launch__logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.1));
      }

      .stella-launch__name {
        font-family: "Cormorant Garamond Launch", Georgia, serif;
        font-size: 30px;
        font-style: italic;
        font-weight: 400;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .stella-launch__dots {
        display: flex;
        gap: 4px;
        margin-top: 2px;
        height: 6px;
        opacity: 0.55;
      }

      .stella-launch__dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: currentColor;
        animation: stella-launch-dot 1.2s ease-in-out infinite;
      }

      .stella-launch__dots span:nth-child(2) {
        animation-delay: 0.18s;
      }

      .stella-launch__dots span:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes stella-launch-dot {
        0%, 80%, 100% { opacity: 0.2; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-2px); }
      }

      .stella-launch__rescue {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 260ms ease;
      }

      .stella-launch__rescue[data-visible="true"] {
        opacity: 1;
        pointer-events: auto;
      }

      .stella-launch__rescue-hint {
        font-family: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        opacity: 0.6;
      }

      .stella-launch__rescue-actions {
        display: flex;
        gap: 8px;
      }

      .stella-launch__btn {
        appearance: none;
        font-family: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.18);
        background: rgba(0, 0, 0, 0.04);
        color: inherit;
        cursor: pointer;
        transition: background 150ms ease, border-color 150ms ease;
      }

      .stella-launch__btn:hover:not(:disabled) {
        background: rgba(0, 0, 0, 0.08);
      }

      .stella-launch__btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      @media (prefers-color-scheme: dark) {
        .stella-launch__btn {
          border-color: rgba(255, 255, 255, 0.18);
          background: rgba(255, 255, 255, 0.06);
        }
        .stella-launch__btn:hover:not(:disabled) {
          background: rgba(255, 255, 255, 0.12);
        }
      }
    </style>
    <!-- Preload critical fonts (must match fonts.css @font-face usage) -->
    <link rel="preload" href="/src/assets/fonts/cormorant-garamond-italic.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
    <link rel="preload" href="/src/assets/fonts/manrope.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/src/assets/fonts/ibm-plex-mono.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  </head>
  <body>
    <div id="stella-launch" class="stella-launch" aria-hidden="true">
      <div class="stella-launch__content">
        <img class="stella-launch__logo" src="/stella-logo.svg" alt="" />
        <div class="stella-launch__name">Stella</div>
        <div class="stella-launch__dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div id="stella-launch-rescue" class="stella-launch__rescue">
          <div class="stella-launch__rescue-hint">Taking longer than usual</div>
          <div class="stella-launch__rescue-actions">
            <button type="button" class="stella-launch__btn" id="stella-launch-restart">
              Restart app
            </button>
            <button type="button" class="stella-launch__btn" id="stella-launch-undo">
              Undo last change
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="/stella-launch-rescue.js"></script>
    <div id="root">
      <div id="stella-mini-boot" style="display: none" aria-hidden="true">
        <div class="stella-mini-boot__top">
          <span></span>
          <span></span>
        </div>
        <div class="stella-mini-boot__body">
          <div class="stella-mini-boot__mark">Stella</div>
          <div class="stella-mini-boot__line stella-mini-boot__line--wide"></div>
          <div class="stella-mini-boot__line"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
